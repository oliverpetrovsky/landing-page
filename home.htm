<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Oliver Petrovsky</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet">
<link href="https://googleapis.com/css2?family=Kalam:wght@300;400;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#f5f5f5;
    color:#111;
    font-family:'Inter',sans-serif;
    padding:2rem;
}

.card{
    text-align:center;
    max-width:900px;
    width:100%;
    animation:fadeIn 1s ease;
}

h1{
    font-family:'Playfair Display',serif;
    font-size:clamp(3rem,8vw,6rem);
    line-height:1;
    margin-bottom:20px;
}

.subtitle{
    text-transform:uppercase;
    letter-spacing:0.25em;
    color:#777;
    font-size:0.95rem;
    margin-bottom:60px;
}

.qr{
    width:240px;
    height:240px;
    border-radius:12px;
    margin-bottom:30px;
    cursor:pointer;
    transition:opacity 0.2s;
}

.qr:hover{
    opacity:0.85;
}

.wallet-container{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:12px;
    flex-wrap:wrap;
    margin-bottom:10px;
}

.wallet{
    font-family:monospace;
    font-size:1rem;
    color:#333;
}

button{
    background:none;
    border:1px solid #111;
    padding:8px 14px;
    cursor:pointer;
    font-family:inherit;
    transition:0.2s;
}

button:hover{
    background:#111;
    color:white;
}

.copied{
    color:#777;
    font-size:0.9rem;
    opacity:0;
    transition:0.3s;
    min-height:1.4em;
    margin-bottom:16px;
}

.copied.show{
    opacity:1;
}

.donate-btn{
    display:inline-block;
    margin-bottom:10px;
    padding:12px 24px;
    border:1px solid #111;
    color:#111;
    text-decoration:none;
    transition:0.2s;
}

.donate-btn:hover{
    background:#111;
    color:white;
}

.wallet-note{
    font-family:'Kalam', cursive;
    font-style:italic;
    font-size:0.85rem;
    color:#999;
    margin-bottom:36px;
}

.quote{
    font-size:1.3rem;
    font-style:italic;
    color:#222;
    transition:0.2s;
}

.quote:hover{
    transform:scale(1.02);
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

@media(max-width:768px){

    .subtitle{
        letter-spacing:0.15em;
        margin-bottom:40px;
    }

    .qr{
        width:180px;
        height:180px;
    }

    .wallet{
        font-size:0.85rem;
        word-break:break-all;
    }

    .quote{
        font-size:1.1rem;
    }

}

</style>
</head>
<body>

<div class="card">

    <h1>Oliver Petrovsky</h1>

    <div class="subtitle">
        Founder · The Awesome Company
    </div>

    <img
        class="qr"
        onclick="copyWallet()"
        title="Click to copy wallet address"
        src="https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=bitcoin:bc1qtv0vnrhr6j5nr5jqvztufdhfl7uwpxmlgw6rvq"
        alt="Bitcoin Wallet QR"
    >

    <div class="wallet-container">
        <span class="wallet" id="wallet">bc1qtv0vnrhr6j5nr5jqvztufdhfl7uwpxmlgw6rvq</span>
        <button onclick="copyWallet()">Copy</button>
    </div>

    <div class="copied" id="copied">Address copied ✓</div>

    <a
        href="bitcoin:bc1qtv0vnrhr6j5nr5jqvztufdhfl7uwpxmlgw6rvq"
        class="donate-btn"
    >
        Open Wallet
    </a>

    <div class="wallet-note">↑ only works if you have a bitcoin wallet app</div>

    <p class="quote">
        "updates coming soon!"
    </p>

</div>

<script>

function copyWallet() {
    const address = "bc1qtv0vnrhr6j5nr5jqvztufdhfl7uwpxmlgw6rvq";
    const copied = document.getElementById("copied");

    if (navigator.clipboard && window.isSecureContext) {
        navigator.clipboard.writeText(address).then(() => showCopied(copied));
    } else {
        const el = document.createElement("textarea");
        el.value = address;
        el.style.cssText = "position:absolute;left:-9999px;top:-9999px";
        document.body.appendChild(el);
        el.focus();
        el.select();
        document.execCommand("copy");
        document.body.removeChild(el);
        showCopied(copied);
    }
}

function showCopied(el) {
    el.classList.add("show");
    setTimeout(() => el.classList.remove("show"), 2000);
}

</script>

</body>
</html>
